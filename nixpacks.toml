[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo",
  "php82Extensions.pdo_mysql",
  "php82Extensions.mbstring",
  "php82Extensions.tokenizer",
  "php82Extensions.xml",
  "php82Extensions.ctype",
  "php82Extensions.fileinfo",
  "php82Extensions.curl",
  "php82Extensions.gd",
  "php82Extensions.openssl",
  "php82Extensions.intl",
  "php82Packages.composer"
]

[phases.install]
cmds = ["composer install --no-dev --optimize-autoloader"]

[phases.build]
cmds = []

[start]
cmd = "php -c php.ini artisan migrate --force && php -c php.ini artisan config:cache && php -c php.ini artisan route:cache && php -c php.ini artisan view:cache && php -c php.ini artisan serve --host=0.0.0.0 --port=$PORT"
